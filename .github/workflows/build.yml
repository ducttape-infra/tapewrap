name: compile-project
run-name: Compile project using Actionfile

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request: {}


jobs:
  test-compile-project:
    runs-on: ubuntu-latest

    steps:
      - name: Enable linger and create user session (workaround)
        uses: gbraad-actions/blacksmith-user-session@main

      - name: Allow unprivileged userns (workaround)
        uses: gbraad-actions/warpbuild-unprivileged-userns@main

      # This folder will be used with the container
      - name: Create userdirs
        run: |
          cd ${{ github.workspace }}
          mkdir -p Projects
          ln -s ${{ github.workspace }}/Projects  ${HOME}/Projects
          mkdir -p Uploads
          ln -s ${{ github.workspace }}/Uploads  ${HOME}/Uploads

      - name: Setup environment
        uses: gbraad-dotfiles/install-action@main
        with:
          upstream: true

      - name: Checkout gstow repo
        uses: actions/checkout@v6
        with:
          repository: gbraad-dotfiles/gstow
          path: Projects/gbraad-dotfiles/gstow

#      - name: Run action command - build
#        uses: gbraad-dotfiles/actionfile-action@main
#        with:
#          file: Actfile.md
#          action: build

      - name: Run build action
        uses: gbraad-actions/zsh-action@main
        with:
          run: |
            cd ${HOME}/Projects/gbraad-dotfiles/gstow
            action build local

